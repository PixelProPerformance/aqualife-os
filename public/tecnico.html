<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registrar visita — Aqualife</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<style>
.sec{padding:32px 0}
.pg-h{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:6px}
.pg-h h1{font-size:24px}
.grid-p{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.param{background:var(--branco);border:1px solid var(--linha);border-radius:10px;padding:13px}
.param label{display:block;font-size:12.5px;font-weight:600;color:var(--tinta);margin-bottom:3px}
.param .un{font-size:11px;color:var(--suave);font-weight:400}
.param input{width:100%;height:40px;border:1.5px solid var(--linha);border-radius:7px;
  padding:0 11px;font-family:inherit;font-size:15px;color:var(--tinta);margin-top:5px}
.param input:focus{outline:none;border-color:var(--agua);box-shadow:0 0 0 3px var(--agua-clr)}
.ideal{font-size:10.5px;color:var(--suave);margin-top:4px}
.previa{position:sticky;top:84px}
.nota-cx{text-align:center;padding:26px 20px;border-bottom:1px solid var(--linha)}
.nota-num{font-size:56px}
.nota-lbl{font-size:12px;color:var(--suave);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.diag-item{padding:13px 16px;border-bottom:1px solid var(--linha);font-size:13.5px;line-height:1.55}
.diag-item:last-child{border:none}
.diag-item .tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  display:inline-block;margin-bottom:4px}
.cols{display:grid;grid-template-columns:1.5fr 1fr;gap:26px;align-items:start}
@media(max-width:900px){.cols{grid-template-columns:1fr}.previa{position:static}}

/* ── FOTOS ── */
.fotos-area{border:2px dashed var(--linha);border-radius:10px;padding:18px;margin-top:18px;
  background:var(--fundo)}
.fotos-area h4{font-size:14px;margin-bottom:10px;color:var(--tinta)}
.fotos-area p{font-size:12.5px;color:var(--suave);margin-bottom:12px}
.btn-foto{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;
  border:1.5px solid var(--agua);border-radius:8px;background:var(--branco);
  color:var(--agua);font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s}
.btn-foto:hover{background:var(--agua-clr)}
#fotos-preview{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.foto-thumb{position:relative;width:80px}
.foto-thumb img{width:80px;height:80px;object-fit:cover;border-radius:8px;
  border:1px solid var(--linha);display:block}
.foto-nome{font-size:9.5px;color:var(--suave);margin-top:3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.foto-rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;
  border-radius:50%;background:var(--critico);color:#fff;border:none;
  cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<header class="topo">
  <div class="wrap topo-in">
    <div class="marca">
      <img src="/images/logo-azul.png" alt="Aqualife" style="height:36px"
           onerror="this.outerHTML='<div class=\'marca-i\'>A</div><div class=\'marca-t\'>Aqualife<small>AQUARISMO</small></div>'">
    </div>
    <nav class="nav">
      <a href="/tecnico.html" class="ativo">Registrar visita</a>
    </nav>
    <button class="btn btn-c btn-sm" id="sair" style="margin-left:auto">Sair</button>
  </div>
</header>

<main class="wrap sec">
  <div class="pg-h">
    <div>
      <h1>Registrar visita</h1>
      <p style="color:var(--suave);font-size:14.5px" id="quem">—</p>
    </div>
  </div>

  <div class="campo" style="max-width:440px;margin:20px 0 26px">
    <label>Aquário visitado</label>
    <select class="inp" id="aquario"><option>Carregando…</option></select>
  </div>

  <div class="cols">
    <div>
      <h3 style="font-size:15px;margin-bottom:14px">Parâmetros medidos</h3>
      <div class="grid-p" id="params"></div>

      <!-- FOTOS -->
      <div class="fotos-area">
        <h4>📷 Fotografias do aquário</h4>
        <p>Até 10 fotos por visita. Ficam disponíveis no laudo do cliente.</p>
        <label class="btn-foto">
          ＋ Adicionar fotos
          <input type="file" id="input-foto" accept="image/*" multiple style="display:none">
        </label>
        <div id="fotos-preview"></div>
      </div>

      <div class="campo" style="margin-top:20px">
        <label>Observação (opcional)</label>
        <textarea class="inp" id="obs" placeholder="Algo que o laudo não capture…"></textarea>
      </div>
      <button class="btn btn-p" id="salvar" style="margin-top:6px">Salvar e enviar ao cliente</button>
    </div>

    <div>
      <h3 style="font-size:15px;margin-bottom:14px">Prévia do laudo</h3>
      <div class="cartao previa" id="previa">
        <div class="vazio" style="padding:38px 20px">Preencha os parâmetros<br>para ver o diagnóstico.</div>
      </div>
    </div>
  </div>
</main>

<script type="module" src="/js/tecnico.js"></script>
</body>
</html>
