<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minha conta — Aqualife</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<style>
.sec{padding:32px 0}
.bloco{padding:22px 24px;margin-bottom:22px}
.bloco h2{font-size:16px;margin-bottom:14px}
.linha-info{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--linha);font-size:14px}
.linha-info:first-child{border-top:none}
</style>
</head>
<body>
<header class="topo">
  <div class="wrap topo-in">
    <div class="marca"><img src="/images/logo-azul.png" alt="Aqualife" style="height:36px" onerror="this.style.display='none'"></div>
    <a href="/dashboard.html" class="btn btn-c btn-sm" style="margin-left:auto">Voltar ao painel</a>
  </div>
</header>
<main class="wrap sec" style="max-width:640px">
  <h1 style="font-size:24px;margin-bottom:20px">Minha conta</h1>

  <div class="cartao bloco">
    <h2>Dados pessoais</h2>
    <div class="linha-info"><span>Nome</span><b id="nome">—</b></div>
    <div class="linha-info"><span>E-mail</span><b id="email">—</b></div>
    <div class="linha-info"><span>Perfil</span><b id="perfil">—</b></div>
  </div>

  <div class="cartao bloco" id="assinatura">
    <h2>Assinatura</h2>
    <div id="assinaturaConteudo" class="vazio" style="padding:8px 0">Carregando…</div>
  </div>

  <div class="cartao bloco">
    <h2>Alterar senha</h2>
    <div class="erro-cx" id="erro" style="display:none"></div>
    <div class="erro-cx" id="ok" style="display:none;background:#ecfdf5;color:#065f46"></div>
    <div class="campo"><label>Senha atual</label><input class="inp" id="senhaAtual" type="password"></div>
    <div class="campo"><label>Nova senha</label><input class="inp" id="novaSenha" type="password" placeholder="mínimo 8 caracteres"></div>
    <button class="btn btn-p" id="btnSenha">Salvar nova senha</button>
  </div>
</main>

<script>
const $=id=>document.getElementById(id);
const token=localStorage.getItem("aqualife_token");
const user=JSON.parse(localStorage.getItem("aqualife_user")||"null");
if(!token||!user){ location.href="/entrar.html"; }

$("nome").textContent=user.name;
$("email").textContent=user.email;
$("perfil").textContent={admin:"Administrador",gestor:"Gestor",tecnico:"Técnico",cliente:"Cliente",aquarista:"Aquarista"}[user.role]||user.role;

async function api(c,o={}){
  const r=await fetch(c,{...o,headers:{"content-type":"application/json",authorization:"Bearer "+token}});
  if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error(j.erro||"HTTP "+r.status);}
  return r.json();
}

async function carregarAssinatura(){
  try{
    const {assinatura,pagamentos}=await api("/api/eu/assinatura");
    if(!assinatura){
      $("assinaturaConteudo").innerHTML=`Você ainda não tem uma assinatura ativa do <b>Aqualife Care</b>.
        <br><a href="/planos.html" class="btn btn-p btn-sm" style="margin-top:12px">Ver planos e assinar</a>`;
      return;
    }
    $("assinaturaConteudo").innerHTML=`
      <div class="linha-info"><span>Plano</span><b>${assinatura.plano}${assinatura.founding_member?" · 🎉 Fundador":""}</b></div>
      <div class="linha-info"><span>Status</span><b>${assinatura.status}</b></div>
      <div class="linha-info"><span>Valor</span><b>R$ ${(assinatura.price_cents/100).toFixed(2).replace(".",",")}/${assinatura.billing_cycle}</b></div>
      ${pagamentos.length?`<h2 style="font-size:14px;margin:16px 0 8px">Histórico de pagamentos</h2>`+
        pagamentos.map(p=>`<div class="linha-info"><span>${new Date(p.created_at).toLocaleDateString("pt-BR")}</span>
          <b>R$ ${(p.valor_cents/100).toFixed(2).replace(".",",")} — ${p.status}</b></div>`).join(""):""}
    `;
  }catch(e){ $("assinaturaConteudo").textContent="Não foi possível carregar."; }
}

$("btnSenha").onclick=async()=>{
  const erro=$("erro"), ok=$("ok");
  erro.style.display="none"; ok.style.display="none";
  try{
    await api("/api/eu/senha",{method:"PUT",body:JSON.stringify({
      senhaAtual:$("senhaAtual").value, novaSenha:$("novaSenha").value})});
    ok.textContent="Senha alterada com sucesso."; ok.style.display="block";
    $("senhaAtual").value=""; $("novaSenha").value="";
  }catch(e){ erro.textContent=e.message; erro.style.display="block"; }
};

carregarAssinatura();
</script><script src="/js/analytics.js" defer></script>
</body>
</html>
