<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Aquabook Aqualife — 286 espécies de peixes, corais e plantas aquáticas com parâmetros, compatibilidades e erros comuns.">
<meta property="og:title" content="Aquabook Aqualife — Espécies Aquáticas">
<meta property="og:url" content="https://aqualifeaquarismo.com/enciclopedia.html">
<meta property="og:image" content="https://aqualifeaquarismo.com/images/reef.png">
<link rel="canonical" href="https://aqualifeaquarismo.com/enciclopedia.html">
<title>Aquabook — Aqualife Aquarismo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<style>
/* ── NAV ── */
.nav-enc{
  position:fixed;top:0;left:0;right:0;z-index:100;height:64px;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--linha);box-shadow:0 1px 6px rgba(18,51,63,.05);
  display:flex;align-items:center;
}
.nav-enc .wi{
  max-width:1280px;margin:0 auto;padding:0 24px;
  width:100%;display:flex;align-items:center;gap:20px;
}
.nav-enc .logo img{height:34px}
.nav-enc .back{
  display:flex;align-items:center;gap:6px;color:var(--suave);
  font-size:13.5px;font-weight:500;text-decoration:none;transition:.15s;
}
.nav-enc .back:hover{color:var(--agua)}
.nav-enc .titulo{font-size:15px;font-weight:700;color:var(--tinta);margin-left:8px}
.nav-enc .busca-wrap{margin-left:auto;position:relative}
.nav-enc .busca{
  width:260px;padding:8px 14px 8px 36px;border-radius:9px;
  border:1.5px solid var(--linha);font-size:14px;font-family:inherit;
  background:var(--papel);color:var(--tinta);
  transition:border-color .15s,box-shadow .15s;outline:none;
}
.nav-enc .busca:focus{border-color:var(--agua);box-shadow:0 0 0 3px var(--agua-clr);background:#fff}
.nav-enc .busca-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--suave)}

/* ── HERO ENC ── */
.enc-hero{
  padding:88px 0 0;
  background:linear-gradient(135deg,var(--tinta) 0%,#1A6080 100%);
  text-align:center;color:#fff;
}
.enc-hero h1{font-size:clamp(1.6rem,3vw,2.4rem);margin-bottom:8px;color:#fff}
.enc-hero p{color:rgba(255,255,255,.7);font-size:15px;margin-bottom:28px}

/* FILTROS */
.filtros{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  padding:0 24px 28px;
}
.filtro{
  padding:9px 20px;border-radius:999px;border:1.5px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);
  font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;
  display:flex;align-items:center;gap:7px;
}
.filtro:hover{background:rgba(255,255,255,.2);color:#fff}
.filtro.on{background:#fff;color:var(--tinta);border-color:#fff}
.enc-stats{
  background:rgba(0,0,0,.2);padding:12px 0;margin-top:0;
  display:flex;justify-content:center;gap:32px;flex-wrap:wrap;
}
.enc-stat{text-align:center;color:rgba(255,255,255,.7);font-size:13px}
.enc-stat span{display:block;font-size:1.3rem;font-weight:700;color:#fff}

/* ── GRID ── */
.enc-main{max-width:1280px;margin:0 auto;padding:28px 24px 60px}
.enc-subtit{
  font-size:13px;font-weight:700;color:var(--suave);
  letter-spacing:.08em;text-transform:uppercase;
  margin:24px 0 12px;padding-bottom:8px;
  border-bottom:1px solid var(--linha);
}
.esp-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:14px;margin-bottom:8px;
}
.esp-card{
  background:#fff;border:1px solid var(--linha);border-radius:12px;
  overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;
}
.esp-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(18,51,63,.12)}
.esp-img{
  height:130px;overflow:hidden;background:var(--agua-clr);
  position:relative;display:flex;align-items:center;justify-content:center;
}
.esp-img img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .4s ease;
}
.esp-card:hover .esp-img img{transform:scale(1.06)}
.esp-img .placeholder{font-size:2.8rem;opacity:.5}
.esp-img .esp-cat{
  position:absolute;top:8px;left:8px;
  font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:5px;
  letter-spacing:.04em;text-transform:uppercase;backdrop-filter:blur(8px);
}
.cat-agua-doce{background:rgba(34,197,94,.85);color:#fff}
.cat-marinho   {background:rgba(59,130,246,.85);color:#fff}
.cat-coral     {background:rgba(245,158,11,.85);color:#fff}
.cat-planta    {background:rgba(16,185,129,.85);color:#fff}
.esp-body{padding:12px 14px}
.esp-nome{font-size:14px;font-weight:700;color:var(--tinta);margin-bottom:2px;line-height:1.3}
.esp-cient{font-style:italic;font-size:11.5px;color:var(--suave);margin-bottom:8px}
.esp-params{display:flex;gap:5px;flex-wrap:wrap}
.esp-param{
  font-size:10.5px;font-weight:600;color:var(--suave);
  background:var(--papel);padding:2px 7px;border-radius:5px;
}
.sem-resultado{
  grid-column:1/-1;text-align:center;padding:60px 20px;
  color:var(--suave);
}
.sem-resultado h3{color:var(--corpo);margin-bottom:8px}

/* ── MODAL / PÁGINA DETALHE ── */
#detalhe{
  display:none;position:fixed;inset:0;z-index:200;
  overflow-y:auto;background:var(--papel);
}
#detalhe.show{display:block}
.det-nav{
  position:sticky;top:0;z-index:10;background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--linha);
  padding:14px 24px;display:flex;align-items:center;gap:12px;
}
.det-back{
  display:flex;align-items:center;gap:6px;font-weight:600;font-size:14px;
  color:var(--agua);background:none;border:none;cursor:pointer;font-family:inherit;
}
.det-wrap{max-width:820px;margin:0 auto;padding:0 24px 60px}

/* HEADER ESPÉCIE */
.det-header{
  background:linear-gradient(135deg,var(--tinta),#1A6080);
  border-radius:16px;padding:32px;margin:24px 0;
  display:grid;grid-template-columns:1fr 220px;gap:24px;align-items:start;
}
@media(max-width:640px){.det-header{grid-template-columns:1fr}}
.det-header h1{color:#fff;font-size:clamp(1.3rem,4vw,1.9rem);margin-bottom:6px}
.det-header .cient{color:rgba(255,255,255,.65);font-style:italic;font-size:15px;margin-bottom:16px}
.det-header .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.det-foto{
  border-radius:12px;overflow:hidden;height:180px;
  background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
}
.det-foto img{width:100%;height:100%;object-fit:cover}
.det-foto .noimg{font-size:3rem;opacity:.4}

/* GRID PARÂMETROS */
.param-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;margin-bottom:20px;
}
.param-card{
  background:#fff;border:1px solid var(--linha);border-radius:10px;
  padding:14px 12px;text-align:center;
}
.param-card .pk{font-size:11px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.param-card .pv{font-size:1.2rem;font-weight:700;color:var(--tinta);line-height:1.2}
.param-card .pu{font-size:11px;color:var(--suave);margin-top:2px}
.param-card.ok .pv{color:var(--ok)}
.param-card.warn .pv{color:var(--atencao)}
.param-card.crit .pv{color:var(--critico)}

/* SECÇÕES DETALHE */
.det-sec{
  background:#fff;border:1px solid var(--linha);border-radius:12px;
  padding:20px;margin-bottom:16px;
}
.det-sec h3{font-size:14px;font-weight:700;color:var(--tinta);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.det-sec p{font-size:14.5px;color:var(--corpo);line-height:1.65}

/* INCOMPATIBILIDADES */
.incompat-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--linha);
}
.incompat-item:last-child{border:none;padding-bottom:0}
.incompat-grav{
  flex-shrink:0;width:72px;text-align:center;
  font-size:10.5px;font-weight:700;padding:3px 0;border-radius:6px;text-transform:uppercase;
}
.grav-critico{background:#FEE2E2;color:#991B1B}
.grav-alerta {background:#FEF3C7;color:#92400E}
.incompat-info h4{font-size:13.5px;font-weight:700;color:var(--tinta);margin-bottom:3px}
.incompat-info p{font-size:13px;color:var(--suave);line-height:1.55}

/* BADGE TEMPERAMENTO */
.temp-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;
}
.temp-pacifico    {background:#D1FAE5;color:#065F46}
.temp-semi_agressivo{background:#FEF3C7;color:#92400E}
.temp-agressivo   {background:#FEE2E2;color:#991B1B}
.temp-solitario   {background:#EDE9FE;color:#5B21B6}

/* CRÉDITO FOTO */
.foto-credit{font-size:10.5px;color:var(--suave);text-align:right;margin-top:4px}
.foto-credit a{color:var(--agua)}

/* LOADING */
.loading{
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:60px;color:var(--suave);font-size:14px;
}
.spin{width:20px;height:20px;border:2.5px solid var(--linha);border-top-color:var(--agua);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav-enc">
  <div class="wi">
    <a href="/site.html" class="logo">
      <img src="/images/logo-azul.png" alt="Aqualife"
           onerror="this.style.display='none'">
    </a>
    <a href="/site.html" class="back">← Início</a>
    <span class="titulo">Aquabook</span>
    <div class="busca-wrap">
      <svg class="busca-ic" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="busca" id="busca" placeholder="Buscar espécie…" autocomplete="off">
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="enc-hero">
  <h1>Aquabook Aqualife</h1>
  <p>286 espécies catalogadas com parâmetros validados em campo, compatibilidades e erros comuns.</p>
  <div class="filtros">
    <button class="filtro on" data-cat="">🌊 Todas</button>
    <button class="filtro" data-cat="agua-doce">🐟 Água doce</button>
    <button class="filtro" data-cat="marinho">🐠 Marinhos</button>
    <button class="filtro" data-cat="coral">🪸 Corais</button>
    <button class="filtro" data-cat="planta">🌿 Plantas</button>
  </div>
  <div class="enc-stats">
    <div class="enc-stat"><span id="cnt-total">286</span>espécies</div>
    <div class="enc-stat"><span>38</span>incompatibilidades</div>
    <div class="enc-stat"><span>4</span>categorias</div>
    <div class="enc-stat"><span>12</span>parâmetros</div>
  </div>
</div>

<!-- GRID -->
<div class="enc-main" id="enc-main">
  <div class="loading"><div class="spin"></div> Carregando espécies…</div>
</div>

<!-- DETALHE -->
<div id="detalhe">
  <div class="det-nav">
    <button class="det-back" onclick="fecharDetalhe()">← Voltar à Aquabook</button>
  </div>
  <div class="det-wrap" id="det-content"></div>
</div>

<script>
/* ── DADOS E ESTADO ─────────────────────────────── */
let TODAS = [];
let catAtiva = "";
let buscaTxt  = "";
let imgCache  = {}; // nome_cientifico → {url, credito}

/* ── WIKIMEDIA IMAGE API ─────────────────────────── */
// Busca foto livre pelo nome científico via Wikipedia API (sem API key)
async function buscarFoto(nomeCientifico) {
  if (!nomeCientifico) return null;
  if (imgCache[nomeCientifico] !== undefined) return imgCache[nomeCientifico];

  try {
    // 1. Tentar Wikipedia API — busca thumbnail da página da espécie
    const termo = encodeURIComponent(nomeCientifico.replace(/ /g, "_"));
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${termo}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(4000) });
    if (r.ok) {
      const d = await r.json();
      if (d.thumbnail?.source) {
        // Pegar versão maior da imagem
        const src = d.thumbnail.source.replace(/\/\d+px-/, "/400px-");
        const credito = d.content_urls?.desktop?.page
          ? `<a href="${d.content_urls.desktop.page}" target="_blank" rel="noopener">© Wikipedia</a> · CC`
          : "© Wikipedia · CC";
        imgCache[nomeCientifico] = { url: src, credito };
        return imgCache[nomeCientifico];
      }
    }
    imgCache[nomeCientifico] = null;
    return null;
  } catch {
    imgCache[nomeCientifico] = null;
    return null;
  }
}

/* ── LABELS ─────────────────────────────────────── */
const CAT_LABEL = { "agua-doce":"Água doce", "marinho":"Marinho", "coral":"Coral", "planta":"Planta" };
const CAT_CLASS = { "agua-doce":"cat-agua-doce", "marinho":"cat-marinho", "coral":"cat-coral", "planta":"cat-planta" };
const TEMP_LABEL = { "pacifico":"😊 Pacífico", "semi_agressivo":"⚠️ Semi-agressivo", "agressivo":"😡 Agressivo", "solitario":"🔒 Solitário" };
const TEMP_CLASS = { "pacifico":"temp-pacifico", "semi_agressivo":"temp-semi_agressivo", "agressivo":"temp-agressivo", "solitario":"temp-solitario" };

/* ── RENDER GRID ─────────────────────────────────── */
function espFiltradas() {
  let lista = TODAS;
  if (catAtiva) lista = lista.filter(e => e.categoria === catAtiva);
  if (buscaTxt) {
    const q = buscaTxt.toLowerCase();
    lista = lista.filter(e =>
      e.nome_comum?.toLowerCase().includes(q) ||
      e.nome_cientifico?.toLowerCase().includes(q)
    );
  }
  return lista;
}

function renderGrid() {
  const lista = espFiltradas();
  const main  = document.getElementById("enc-main");
  document.getElementById("cnt-total").textContent = lista.length;

  if (!lista.length) {
    main.innerHTML = `<div class="sem-resultado"><h3>Nenhuma espécie encontrada</h3><p>Tenta outro termo ou remove os filtros.</p></div>`;
    return;
  }

  // Agrupar por categoria
  const grupos = {};
  for (const e of lista) {
    if (!grupos[e.categoria]) grupos[e.categoria] = [];
    grupos[e.categoria].push(e);
  }
  const ORD = ["agua-doce","marinho","coral","planta"];

  let html = "";
  for (const cat of ORD) {
    if (!grupos[cat]) continue;
    html += `<div class="enc-subtit">${CAT_LABEL[cat] || cat} (${grupos[cat].length})</div>
             <div class="esp-grid" data-cat="${cat}">`;
    for (const e of grupos[cat]) {
      html += `<div class="esp-card" data-id="${e.id}" onclick="abrirDetalhe('${e.id}')">
        <div class="esp-img" id="img-${e.id}">
          <span class="placeholder">🐠</span>
          <span class="esp-cat ${CAT_CLASS[e.categoria]}">${CAT_LABEL[e.categoria]}</span>
        </div>
        <div class="esp-body">
          <div class="esp-nome">${e.nome_comum}</div>
          <div class="esp-cient">${e.nome_cientifico || ""}</div>
          <div class="esp-params">
            ${e.ph_min ? `<span class="esp-param">pH ${e.ph_min}–${e.ph_max}</span>` : ""}
            ${e.temp_min ? `<span class="esp-param">${e.temp_min}–${e.temp_max}°C</span>` : ""}
            ${e.volume_min ? `<span class="esp-param">${e.volume_min}L mín.</span>` : ""}
            ${e.tamanho_adulto ? `<span class="esp-param">${e.tamanho_adulto}cm</span>` : ""}
          </div>
        </div>
      </div>`;
    }
    html += "</div>";
  }
  main.innerHTML = html;

  // Carregar fotos de forma lazy (Intersection Observer)
  carregarFotosLazy(lista);
}

function carregarFotosLazy(lista) {
  const obs = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      obs.unobserve(entry.target);
      const id = entry.target.id.replace("img-","");
      const e = lista.find(x => x.id === id);
      if (e?.nome_cientifico) carregarFotoCard(e);
    }
  }, { rootMargin: "200px" });

  for (const e of lista) {
    const el = document.getElementById(`img-${e.id}`);
    if (el) obs.observe(el);
  }
}

async function carregarFotoCard(e) {
  const container = document.getElementById(`img-${e.id}`);
  if (!container) return;
  const foto = await buscarFoto(e.nome_cientifico);
  if (foto?.url) {
    container.innerHTML = `
      <img src="${foto.url}" alt="${e.nome_comum}" loading="lazy"
           onerror="this.parentElement.innerHTML='<span class=\\'placeholder\\'>🐠</span>'">
      <span class="esp-cat ${CAT_CLASS[e.categoria]}">${CAT_LABEL[e.categoria]}</span>`;
  }
}

/* ── DETALHE DA ESPÉCIE ──────────────────────────── */
async function abrirDetalhe(id) {
  const sp = TODAS.find(x=>x.id===id);
  if (sp?.slug) {
    // Actualizar URL sem recarregar a página
    history.pushState({slug: sp.slug, id}, sp.nome_comum,
      `/aquabook.html?especie=${sp.slug}`);
    document.title = `${sp.nome_comum} — Aquabook Aqualife`;
  }

  document.getElementById("det-content").innerHTML =
    `<div class="loading"><div class="spin"></div> Carregando…</div>`;
  document.getElementById("detalhe").classList.add("show");
  window.scrollTo(0,0);

  try {
    const [e, foto] = await Promise.all([
      fetch(`/api/especies/${id}`).then(r=>r.json()),
      (async () => {
        const sp = TODAS.find(x=>x.id===id);
        // Usar foto_url do JSON se existir, senão Wikipedia
        if (sp?.foto_url && sp.foto_url.trim()) {
          return { url: sp.foto_url, credito: "© Aqualife Aquarismo" };
        }
        return sp ? buscarFoto(sp.nome_cientifico) : null;
      })()
    ]);
    renderDetalhe(e, foto);
  } catch(err) {
    document.getElementById("det-content").innerHTML =
      `<p style="padding:40px;color:var(--critico)">Erro ao carregar espécie.</p>`;
  }
}

function fecharDetalhe() {
  document.getElementById("detalhe").classList.remove("show");
  history.pushState({}, "Aquabook — Aqualife", "/aquabook.html");
  document.title = "Aquabook — Aqualife Aquarismo";
}

function renderDetalhe(e, foto) {
  const isFoto = foto?.url;

  // Parâmetros da água (apenas os não-nulos)
  const params = [
    { k:"Temperatura", v: e.temp_min&&e.temp_max ? `${e.temp_min}–${e.temp_max}` : null, u:"°C" },
    { k:"pH", v: e.ph_min&&e.ph_max ? `${e.ph_min}–${e.ph_max}` : null, u:"" },
    { k:"GH", v: e.gh_min&&e.gh_max ? `${e.gh_min}–${e.gh_max}` : null, u:"°dGH" },
    { k:"KH", v: e.kh_min&&e.kh_max ? `${e.kh_min}–${e.kh_max}` : null, u:"°dKH" },
    { k:"Salinidade", v: e.salinidade_min&&e.salinidade_max ? `${e.salinidade_min}–${e.salinidade_max}` : null, u:"sg" },
    { k:"Cálcio", v: e.calcio_min&&e.calcio_max ? `${e.calcio_min}–${e.calcio_max}` : null, u:"ppm" },
    { k:"Magnésio", v: e.magnesio_min&&e.magnesio_max ? `${e.magnesio_min}–${e.magnesio_max}` : null, u:"ppm" },
    { k:"KH (reef)", v: e.kh_min&&e.kh_max&&e.categoria==="coral" ? `${e.kh_min}–${e.kh_max}` : null, u:"°dKH" },
    { k:"NO₃ máx.", v: e.no3_max ?? null, u:"ppm" },
    { k:"Fosfato máx.", v: e.fosfato_max ?? null, u:"ppm" },
    { k:"Volume mín.", v: e.volume_min ?? null, u:"L" },
    { k:"Tamanho adulto", v: e.tamanho_adulto ?? null, u:"cm" },
    { k:"Cardume mín.", v: e.cardume_min ?? null, u:"peixes" },
    { k:"Luz", v: e.luz ?? null, u:"" },
    { k:"Fluxo", v: e.fluxo ?? null, u:"" },
    { k:"CO₂", v: e.co2 ?? null, u:"" },
    { k:"Dificuldade", v: e.dificuldade ?? null, u:"" },
  ].filter(p => p.v !== null && p.v !== undefined && p.v !== "");

  const tempBadge = e.temperamento
    ? `<span class="temp-badge ${TEMP_CLASS[e.temperamento]||''}">${TEMP_LABEL[e.temperamento]||e.temperamento}</span>`
    : "";

  const incompatHtml = e.incompatibilidades?.length
    ? e.incompatibilidades.map(i => {
        const outro = i.especie_a?.toLowerCase()===e.nome_comum?.toLowerCase() ? i.especie_b : i.especie_a;
        return `<div class="incompat-item">
          <span class="incompat-grav grav-${i.gravidade}">${i.gravidade}</span>
          <div class="incompat-info">
            <h4>${outro}</h4>
            <p>${i.motivo || ""}</p>
          </div>
        </div>`;
      }).join("")
    : `<p style="color:var(--suave);font-size:14px">Nenhuma incompatibilidade registada.</p>`;

  document.getElementById("det-content").innerHTML = `
    <div class="det-header">
      <div>
        <div class="det-header-cats">${tempBadge}</div>
        <h1>${e.nome_comum}</h1>
        <div class="cient">${e.nome_cientifico || ""}</div>
        <div class="cats">
          <span class="esp-cat ${CAT_CLASS[e.categoria]}" style="position:static">${CAT_LABEL[e.categoria]}</span>
          ${e.tipo_coral ? `<span class="esp-cat" style="position:static;background:rgba(245,158,11,.85);color:#fff">${e.tipo_coral}</span>` : ""}
          ${e.cuidado ? `<span class="esp-cat" style="position:static;background:rgba(99,102,241,.85);color:#fff">${e.cuidado}</span>` : ""}
          ${e.dificuldade ? `<span class="esp-cat" style="position:static;background:rgba(16,185,129,.85);color:#fff">${e.dificuldade}</span>` : ""}
        </div>
      </div>
      <div>
        <div class="det-foto">
          ${isFoto
            ? `<img src="${foto.url}" alt="${e.nome_comum}"
                    onerror="this.parentElement.innerHTML='<span class=\\'noimg\\'>🐠</span>'">`
            : `<span class="noimg">🐠</span>`}
        </div>
        ${isFoto ? `<div class="foto-credit">${foto.credito}</div>` : ""}
      </div>
    </div>

    <div class="param-grid">
      ${params.map(p => `
        <div class="param-card">
          <div class="pk">${p.k}</div>
          <div class="pv">${p.v}</div>
          ${p.u ? `<div class="pu">${p.u}</div>` : ""}
        </div>`).join("")}
    </div>

    ${e.erros_comuns ? `
    <div class="det-sec">
      <h3>⚠️ Erros mais comuns</h3>
      <p>${e.erros_comuns}</p>
    </div>` : ""}

    ${e.sinais_estresse ? `
    <div class="det-sec">
      <h3>🔴 Sinais de estresse</h3>
      <p>${e.sinais_estresse}</p>
    </div>` : ""}

    ${e.notas ? `
    <div class="det-sec">
      <h3>📋 Notas técnicas</h3>
      <p>${e.notas}</p>
    </div>` : ""}

    <div class="det-sec">
      <h3>🚫 Incompatibilidades (${e.incompatibilidades?.length || 0})</h3>
      ${incompatHtml}
    </div>

    <div style="text-align:center;padding:28px 0 12px">
      <a href="/site.html#agendamento" class="btn btn-p" style="text-decoration:none"
         onclick="location.href='/site.html';return false">
        Agendar manutenção
      </a>
    </div>`;
}

/* ── FILTROS + BUSCA ─────────────────────────────── */
document.querySelectorAll(".filtro").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filtro").forEach(b => b.classList.remove("on"));
    btn.classList.add("on");
    catAtiva = btn.dataset.cat;
    renderGrid();
  });
});

document.getElementById("busca").addEventListener("input", e => {
  buscaTxt = e.target.value.trim();
  renderGrid();
});

// Fechar detalhe com ESC
document.addEventListener("keydown", e => {
  if (e.key === "Escape") fecharDetalhe();
});

/* ── INIT ────────────────────────────────────────── */
async function init() {
  try {
    const r = await fetch("/api/especies?limit=300");
    TODAS = await r.json();
    renderGrid();
  } catch(err) {
    document.getElementById("enc-main").innerHTML =
      `<div class="sem-resultado"><h3>Erro ao carregar</h3><p>${err.message}</p></div>`;
  }
}

init().then(() => {
  // Suporte a URL directa: /aquabook.html?especie=neon-tetra
  const params = new URLSearchParams(location.search);
  const slug = params.get("especie");
  if (slug) {
    const esp = TODAS.find(x => x.slug === slug);
    if (esp) abrirDetalhe(esp.id);
  }
  // Botão Back do browser
  window.addEventListener("popstate", e => {
    if (e.state?.slug) {
      const esp = TODAS.find(x => x.slug === e.state.slug);
      if (esp) { document.getElementById("detalhe").classList.add("show"); }
    } else {
      fecharDetalhe();
    }
  });
});
</script>
</body>
</html>
