<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meus aquários — Aqualife</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Georgia&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<style>
.sec{padding:32px 0}
.aq-card{margin-bottom:20px;overflow:hidden}
.aq-top{display:flex;justify-content:space-between;align-items:center;gap:16px;
  padding:20px 24px;border-bottom:1px solid var(--linha)}
.aq-nome{font-size:18px;font-weight:600;color:var(--tinta)}
.aq-meta{font-size:13px;color:var(--suave);margin-top:2px}
.aq-nota{display:flex;align-items:center;gap:14px}
.aq-nota .n{font-family:Georgia,serif;font-size:38px;font-weight:700;line-height:1}
.aq-corpo{padding:20px 24px}
.laudo-txt{font-size:15px;line-height:1.65;color:var(--corpo);margin-bottom:16px}
.hist{display:flex;gap:6px;align-items:flex-end;height:44px;margin-top:8px}
.hist .b{flex:1;border-radius:3px 3px 0 0;min-height:4px;opacity:.85}
.hist-lbl{font-size:11px;color:var(--suave);margin-top:8px}
.acoes-l{list-style:none;margin-top:8px}
.acoes-l li{padding:10px 0;border-top:1px solid var(--linha);font-size:14px;
  display:flex;gap:9px;line-height:1.55}
.acoes-l li::before{content:"→";color:var(--agua);font-weight:700;flex-shrink:0}
.duvida-bt{margin-top:14px}
.aq-acoes-extra{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.param-graficos{display:none;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:16px;
  padding-top:16px;border-top:1px solid var(--linha)}
.param-graficos.on{display:grid}
.param-box{background:var(--papel);border-radius:9px;padding:10px 12px}
.param-box .p-nome{font-size:11.5px;font-weight:600;color:var(--tinta);margin-bottom:6px;text-transform:uppercase}
.param-box svg{width:100%;height:44px;display:block}
.param-box .p-atual{font-size:12px;color:var(--suave);margin-top:4px}
</style>
</head>
<body>

<header class="topo">
  <div class="wrap topo-in">
    <div class="marca">
      <img src="/images/logo-azul.png" alt="Aqualife" style="height:36px" onerror="this.style.display='none'">
    </div>
    <a href="/dashboard.html" class="btn btn-c btn-sm" style="margin-left:auto">Voltar ao painel</a>
  </div>
</header>

<main class="wrap sec">
  <h1 style="font-size:24px;margin-bottom:5px">Meus aquários</h1>
  <p style="color:var(--suave);font-size:14.5px;margin-bottom:26px" id="quem">—</p>
  <div id="lista"><div class="vazio">Carregando…</div></div>
</main>

<script>
const $=id=>document.getElementById(id);
const token=localStorage.getItem("aqualife_token");
const user=JSON.parse(localStorage.getItem("aqualife_user")||"null");
if(!token||!user){ location.href="/entrar.html"; }
$("quem").textContent = user ? user.name : "";

const URG={ok:["Saudável","selo-ok","#2E7D55"],atencao:["Atenção","selo-atencao","#B8860B"],
  alerta:["Alerta","selo-alerta","#C05621"],critico:["Crítico","selo-critico","#B23A2E"]};
const TIPO={freshwater:"água doce",marine:"marinho",pond:"lago"};
const PARAM_LBL={ph:"pH",kh:"KH",gh:"GH",amonia:"Amônia",nitrito:"NO2",nitrato:"NO3",temperatura:"Temp."};

async function api(c,o={}){
  const r=await fetch(c,{...o,headers:{"content-type":"application/json",authorization:"Bearer "+token}});
  if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error(j.erro||"HTTP "+r.status);}
  return r.json();
}

async function carregar(){
  try{
    const {ambientes}=await api("/api/cliente/painel");
    if(!ambientes.length){
      $("lista").innerHTML=`<div class="vazio">Você ainda não tem aquários cadastrados.<br>
        Assim que a primeira visita for feita, o laudo aparece aqui.</div>`;
      return;
    }
    const cards=[];
    for(const a of ambientes){
      let laudoTxt="";
      if(a.ultimo){
        try{ const l=await api(`/api/laudo/${a.ultimo.id}/cliente`); laudoTxt=l.texto; }catch(e){}
      }
      cards.push(card(a,laudoTxt));
    }
    $("lista").innerHTML=cards.join("");

    document.querySelectorAll("[data-duvida]").forEach(b=>b.onclick=async()=>{
      const p=prompt("Qual sua dúvida sobre este laudo?");
      if(!p) return;
      try{ await api("/api/esclarecimento",{method:"POST",
        body:JSON.stringify({reading_id:b.dataset.duvida,pergunta:p})});
        alert("Sua dúvida foi enviada. A equipe vai responder em breve.");
      }catch(e){ alert("Erro: "+e.message); }
    });

    document.querySelectorAll("[data-evolucao]").forEach(b=>b.onclick=()=>abrirEvolucao(b.dataset.evolucao));
    document.querySelectorAll("[data-pdf]").forEach(b=>b.onclick=()=>exportarPDF(b.dataset.pdf, b.dataset.pdfNome));
  }catch(e){
    $("lista").innerHTML=`<div class="vazio">Não foi possível carregar agora.<br>Tente recarregar a página.</div>`;
  }
}

function card(a,laudoTxt){
  if(!a.ultimo){
    return `<div class="cartao aq-card"><div class="aq-top">
      <div><div class="aq-nome">${a.label}</div>
      <div class="aq-meta">${TIPO[a.water_type]} · ${a.volume_liters||"—"} L</div></div></div>
      <div class="aq-corpo"><div class="vazio" style="padding:20px">Aguardando a primeira visita.</div></div></div>`;
  }
  const u=a.ultimo, [ulbl,ucls,ucor]=URG[u.urgency]||URG.ok;
  const diag=u.diagnostico||{};
  const acoes=(diag.acoes||[]).map(x=>x.hobby&&x.hobby!=="—"?x.hobby:x.tecnico).filter(Boolean);
  const serie=[...a.serie].reverse();
  return `<div class="cartao aq-card">
    <div class="aq-top">
      <div><div class="aq-nome">${a.label}</div>
        <div class="aq-meta">${TIPO[a.water_type]} · ${a.volume_liters||"—"} L · última visita ${dt(u.created_at)}</div></div>
      <div class="aq-nota">
        <span class="selo ${ucls}">${ulbl}</span>
        <span class="n" style="color:${ucor}">${u.health_score}</span>
      </div>
    </div>
    <div class="aq-corpo">
      ${laudoTxt?`<p class="laudo-txt">${laudoTxt}</p>`:""}
      ${acoes.length?`<ul class="acoes-l">${acoes.map(x=>`<li>${x}</li>`).join("")}</ul>`:""}
      ${serie.length>1?`<div class="hist">${serie.map(s=>{
        const [,,cor]=URG[s.urg]||URG.ok;
        return `<div class="b" style="height:${Math.max(s.nota,4)}%;background:${cor}" title="${s.nota}"></div>`;
      }).join("")}</div><div class="hist-lbl">Evolução das últimas visitas</div>`:""}
      <div class="aq-acoes-extra">
        <button class="btn btn-c btn-sm duvida-bt" data-duvida="${u.id}">Tenho uma dúvida</button>
        <button class="btn btn-c btn-sm" data-evolucao="${a.id}">📈 Evolução dos parâmetros</button>
        <button class="btn btn-c btn-sm" data-pdf="${u.id}" data-pdf-nome="${a.label}">⬇ Baixar PDF</button>
      </div>
      <div class="param-graficos" id="graf-${a.id}"><div class="vazio" style="padding:10px 0">Carregando…</div></div>
    </div>
  </div>`;
}
function dt(s){return new Date(s).toLocaleDateString("pt-BR",{day:"2-digit",month:"short"})}

/* ── EVOLUÇÃO POR PARÂMETRO (mini-gráficos SVG) ─────────────── */
async function abrirEvolucao(assetId){
  const box=$("graf-"+assetId);
  const jaAberto=box.classList.contains("on");
  box.classList.toggle("on");
  if(jaAberto || box.dataset.carregado) return;
  try{
    const {historico}=await api(`/api/aquarios/${assetId}/historico`);
    if(!historico.length){ box.innerHTML=`<div class="vazio" style="padding:10px 0">Sem histórico suficiente ainda.</div>`; return; }
    const parametros=Object.keys(PARAM_LBL).filter(p=>historico.some(h=>h.values && h.values[p]!=null));
    box.innerHTML = parametros.length ? parametros.map(p=>miniGrafico(p,historico)).join("")
      : `<div class="vazio" style="padding:10px 0">Sem parâmetros registados ainda.</div>`;
    box.dataset.carregado="1";
  }catch(e){ box.innerHTML=`<div class="vazio">Erro ao carregar histórico.</div>`; }
}

function miniGrafico(param,historico){
  const vals=historico.map(h=>h.values?.[param]).filter(v=>v!=null);
  if(!vals.length) return "";
  const min=Math.min(...vals), max=Math.max(...vals);
  const w=200,h=40,pad=4;
  const pontos=vals.map((v,i)=>{
    const x=pad+(i/(Math.max(vals.length-1,1)))*(w-pad*2);
    const y= max===min ? h/2 : h-pad-((v-min)/(max-min))*(h-pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const atual=vals[vals.length-1];
  return `<div class="param-box">
    <div class="p-nome">${PARAM_LBL[param]}</div>
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <polyline points="${pontos}" fill="none" stroke="#0E7490" stroke-width="2"/>
    </svg>
    <div class="p-atual">atual: ${atual}${vals.length>1?` · min ${min} · max ${max}`:""}</div>
  </div>`;
}

/* ── EXPORT PDF (simplificado, laudo do cliente) ─────────────── */
async function exportarPDF(readingId,aquarioNome){
  try{
    if(!window.jspdf){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        s.onload=res; s.onerror=rej; document.head.appendChild(s);
      });
    }
    const l=await api(`/api/laudo/${readingId}/cliente`);
    const { jsPDF }=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,M=16;
    doc.setFillColor(11,42,58); doc.rect(0,0,W,38,'F');
    doc.setFontSize(20); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
    doc.text('Aqualife Aquarismo',M,16);
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(148,163,184);
    doc.text('Laudo técnico de qualidade da água',M,23);
    doc.text(`Data: ${new Date().toLocaleDateString('pt-BR')}`,M,29);

    let y=52;
    doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.setTextColor(11,42,58);
    doc.text(aquarioNome||'Aquário',M,y); y+=10;

    const cores={ok:[34,197,94],atencao:[234,179,8],alerta:[249,115,22],critico:[239,68,68]};
    const corUrg=cores[l.urgencia]||cores.ok;
    doc.setFontSize(30); doc.setFont('helvetica','bold'); doc.setTextColor(...corUrg);
    doc.text(String(l.nota||0),M,y+14);
    doc.setFontSize(12);
    const urgLbl={ok:'Saudável',atencao:'Acompanhar',alerta:'Atenção',critico:'Crítico'}[l.urgencia]||'';
    doc.text(urgLbl,M+30,y+10);
    y+=28;

    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(30,41,59);
    const texto=doc.splitTextToSize(l.texto||'Está tudo dentro do esperado.',W-M*2);
    doc.text(texto,M,y);

    doc.save(`laudo-${(aquarioNome||'aquario').toLowerCase().replace(/\s+/g,'-')}.pdf`);
  }catch(e){ alert('Erro ao gerar PDF: '+e.message); }
}

carregar();
</script><script src="/js/analytics.js" defer></script>
</body>
</html>
